name: Contact Compliance

on:
  schedule:
    # 05:00 UTC = 10:00 AM PKT (UTC+5). Scheduled runs use the DRY_RUN
    # value written in config.js (no dropdown on scheduled runs).
    - cron: "0 5 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run? true = safe test (report only), false = LIVE (posts notes + sends emails)"
        required: true
        type: choice
        default: "true"
        options:
          - "true"
          - "false"

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: node contact-compliance.js
        env:
          HUBSPOT_TOKEN: ${{ secrets.HUBSPOT_TOKEN }}
          GEMINI_KEY: ${{ secrets.GEMINI_KEY }}
          RESEND_KEY: ${{ secrets.RESEND_KEY }}
          DRY_RUN_INPUT: ${{ inputs.dry_run }}
